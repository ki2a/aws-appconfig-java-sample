stages:
  - build
  - test
  - security
  - package

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: al2023-application
  JAVA_VERSION: "17"

cache:
  paths:
    - .m2/repository/

build:
  stage: build
  image: maven:3.9-amazoncorretto-17
  script:
    - mvn -B package -DskipTests
  artifacts:
    paths:
      - target/*.jar

test:
  stage: test
  image: maven:3.9-amazoncorretto-17
  script:
    - mvn -B test
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml

security-scan:
  stage: security
  image: maven:3.9-amazoncorretto-17
  script:
    - mvn -B org.owasp:dependency-check-maven:check
  allow_failure: true
  artifacts:
    paths:
      - target/dependency-check-report.html

docker-build:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  only:
    - main
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHA -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:$CI_COMMIT_SHA
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
